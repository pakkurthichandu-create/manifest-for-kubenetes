apiVersion: apps/v1 
kind: Deployment
metadata:
  name: my-app-deployment
spec: 
  replicas: 1
  selector: 
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: chandu4440/jenkins-practice:latest
          ports:
            - containerPort: 8080
          